<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — No Signal · Raz Silberman</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Signal palette — dark "Signal lost" tokens */
  --crt-black:        #14131A;
  --crt-surface:      #211F2A;
  --broadcast-white:  #ECE9F0;
  --text-muted:       #8C8898;

  /* Test-card bars (softened, AA-tuned) */
  --bar-white:   #ECE9F0;
  --bar-butter:  #F2D74E;
  --bar-sky:     #5BC4E8;
  --bar-sage:    #6FB264;
  --bar-orchid:  #B05BA8;
  --bar-tomato:  #F25450;
  --bar-indigo:  #3A52A0;

  --ff-body: 'Inter', system-ui, -apple-system, sans-serif;
  --ff-mono: 'JetBrains Mono', ui-monospace, monospace;
  --expo: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--crt-black);
  color: var(--broadcast-white);
  font-family: var(--ff-body);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* ─── Stage ─── */
.stage {
  position: relative;
  width: 100%;
  height: 100vh;
  isolation: isolate;
  background:
    radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.35) 100%),
    var(--crt-black);
}

/* ═══════════════════════════════════════════════════════════════════════
   .signal-tv — reusable CRT "test card" component (mirrors index.html).

   Normally renders an <img> as a vintage TV broadcast. Here, the whole
   page IS the TV, so the SMPTE bars take the role of `.signal-tv__img`
   and the always-on scanlines/tracking/grain/flicker layers come for free.

   Two 404-specific deviations from the component on index.html:
     1. No foreground <img> → no `glitch-slices` variant (it operates on
        image pixel rows). Skipped from the scheduler below.
     2. `glitch-split` (chroma split) on the component shifts SVG-filtered
        ghost copies of the image. There's no image here, so the split is
        applied to the label TYPOGRAPHY instead — RGB fringe on "404",
        which is the only content on screen where chroma split reads.

   Everything else — class names, keyframes, scheduler cadence — matches
   the component verbatim so the effect stays cohesive across the site.
   ═══════════════════════════════════════════════════════════════════════ */
.signal-tv {
  /* 404 overrides — full-bleed, no aspect cap, CRT-black background */
  --signal-tv-bg:     var(--crt-black);
  --signal-tv-border: none;

  position: absolute;
  inset: 0;
  background: var(--signal-tv-bg);
  border: var(--signal-tv-border);
  overflow: hidden;
  display: grid;
  place-items: center;

  contain: layout paint style;
  isolation: isolate;
}

/* ─── The "image" — the SMPTE bar stack ─── */
.signal-tv__img {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: 1fr 0.18fr 0.12fr;
  z-index: 1;
  animation: signal-tv-flicker 5s ease-in-out infinite;
}

/* Row 1 — the seven SMPTE color bars */
.row-main { display: grid; grid-template-columns: repeat(7, 1fr); }
.row-main > :nth-child(1) { background: var(--bar-white);  }
.row-main > :nth-child(2) { background: var(--bar-butter); }
.row-main > :nth-child(3) { background: var(--bar-sky);    }
.row-main > :nth-child(4) { background: var(--bar-sage);   }
.row-main > :nth-child(5) { background: var(--bar-orchid); }
.row-main > :nth-child(6) { background: var(--bar-tomato); }
.row-main > :nth-child(7) { background: var(--bar-indigo); }

/* Row 2 — inverse castellation */
.row-inverse { display: grid; grid-template-columns: repeat(7, 1fr); }
.row-inverse > :nth-child(1) { background: var(--bar-indigo); }
.row-inverse > :nth-child(2) { background: var(--crt-black);  }
.row-inverse > :nth-child(3) { background: var(--bar-orchid); }
.row-inverse > :nth-child(4) { background: var(--crt-black);  }
.row-inverse > :nth-child(5) { background: var(--bar-sky);    }
.row-inverse > :nth-child(6) { background: var(--crt-black);  }
.row-inverse > :nth-child(7) { background: var(--bar-white);  }

/* Row 3 — PLUGE / grayscale ramp */
.row-pluge {
  display: grid;
  grid-template-columns:
    1.2fr 0.9fr 0.9fr 1fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.7fr;
}
.row-pluge > :nth-child(1)  { background: #002032; }
.row-pluge > :nth-child(2)  { background: var(--broadcast-white); }
.row-pluge > :nth-child(3)  { background: #5F1C5B; }
.row-pluge > :nth-child(4)  { background: var(--crt-black);  }
.row-pluge > :nth-child(5)  { background: #1A1A22; }
.row-pluge > :nth-child(6)  { background: #2A2A36; }
.row-pluge > :nth-child(7)  { background: #3A3A4A; }
.row-pluge > :nth-child(8)  { background: #545464; }
.row-pluge > :nth-child(9)  { background: #74748A; }
.row-pluge > :nth-child(10) { background: #9A9AB0; }
.row-pluge > :nth-child(11) { background: var(--crt-black); }

/* ─── CRT overlays — scanlines (::before) + tracking band (::after) ─── */
.signal-tv::before,
.signal-tv::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
}
.signal-tv::before {
  z-index: 7;
  background-image: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,.18) 3px,
    rgba(0,0,0,0) 4px
  );
  mix-blend-mode: multiply;
  opacity: .5;
}
.signal-tv::after {
  z-index: 8;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0 80px,
    rgba(255,255,255,.05) 80px 82px,
    transparent 82px 160px,
    rgba(0,0,0,.18) 160px 163px,
    transparent 163px 320px
  );
  background-size: 100% 320px;
  mix-blend-mode: overlay;
  animation: signal-tv-tracking 14s linear infinite;
  will-change: background-position;
}

/* ─── CRT grain (animated fractal noise) ─── */
.signal-tv__grain {
  position: absolute; inset: -50%;
  width: 200%; height: 200%;
  z-index: 9;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .1;
  mix-blend-mode: multiply;
  animation: signal-tv-grain .12s steps(2) infinite;
  will-change: transform;
}

/* ─── Always-on keyframes (verbatim from the component) ─── */
@keyframes signal-tv-flicker {
  0%, 100% { filter: brightness(1)    contrast(1); }
  50%      { filter: brightness(1.02) contrast(1.02); }
  92%      { filter: brightness(.97)  contrast(1.04); }
  94%      { filter: brightness(1.04) contrast(.98); }
}
@keyframes signal-tv-tracking {
  0%   { background-position: 0 0%; }
  100% { background-position: 0 -200%; }
}
@keyframes signal-tv-grain {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(-2%, -3%); }
  50%  { transform: translate(3%, 1%); }
  75%  { transform: translate(-1%, 2%); }
  100% { transform: translate(2%, -1%); }
}

/* ═══ Glitch states — toggled by the scheduler, never on by default ═══ */
.signal-tv.glitch-tear   .signal-tv__img { animation: signal-tv-tear   .24s steps(3) 1; }
.signal-tv.glitch-jitter .signal-tv__img { animation: signal-tv-jitter .16s steps(2) 1; }

/* glitch-split: 404-specific — RGB fringe on the label typography
   instead of channel-shifted image ghosts (see header comment). */
.signal-tv.glitch-split .label__error          { animation: signal-tv-split-dim    .36s steps(2) 1; }
.signal-tv.glitch-split .label__error::before  { animation: signal-tv-split-text-r .36s steps(2) 1; }
.signal-tv.glitch-split .label__error::after   { animation: signal-tv-split-text-c .36s steps(2) 1; }

@keyframes signal-tv-tear {
  0%   { transform: translateX(0); clip-path: inset(0 0 0 0); }
  25%  { transform: translateX(-5px); clip-path: inset(38% 0 48% 0); }
  50%  { transform: translateX(6px);  clip-path: inset(22% 0 62% 0); }
  75%  { transform: translateX(-3px); clip-path: inset(58% 0 30% 0); }
  100% { transform: translateX(0);    clip-path: inset(0 0 0 0); }
}
@keyframes signal-tv-jitter {
  0%, 100% { transform: translateX(0); }
  50%      { transform: translateX(1.5px); }
}
@keyframes signal-tv-split-dim {
  0%, 100% { opacity: 1; }
  25%, 75% { opacity: .35; }
}
@keyframes signal-tv-split-text-r {
  0%, 100% { opacity: 0; transform: translate(-2px, 0); }
  25%      { opacity: .8; transform: translate(-8px, 1px); }
  75%      { opacity: .8; transform: translate(-11px, 0); }
}
@keyframes signal-tv-split-text-c {
  0%, 100% { opacity: 0; transform: translate(2px, 0); }
  25%      { opacity: .8; transform: translate(8px, -1px); }
  75%      { opacity: .8; transform: translate(11px, 0); }
}

/* ─── Overlay UI (channel badge, timestamp, label, actions) ─── */
.label {
  position: relative;
  z-index: 5;
  background: var(--crt-black);
  color: var(--broadcast-white);
  padding: clamp(1rem, 2vw, 1.4rem) clamp(2rem, 5vw, 3.6rem);
  border: 2px solid var(--crt-black);
  outline: 6px solid rgba(255,255,255,.04);
  box-shadow:
    0 0 0 1px rgba(236,233,240,.08),
    0 30px 80px rgba(0,0,0,.6);
  text-align: center;
  letter-spacing: 0.18em;
  font-family: var(--ff-mono);
  user-select: none;
}
.label__error {
  display: block;
  font-size: clamp(2.4rem, 7vw, 5.2rem);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: 0.04em;
  position: relative;
}
.label__signal {
  display: block;
  font-size: clamp(1rem, 2.2vw, 1.8rem);
  font-weight: 500;
  margin-top: .55em;
  letter-spacing: 0.42em;
}
.label__sub {
  display: block;
  margin-top: 1.1em;
  font-size: clamp(.7rem, 1vw, .85rem);
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
}

/* Chroma-fringe layers — driven by glitch-split keyframes above */
.label__error::before,
.label__error::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: screen;
}
.label__error::before { color: var(--bar-tomato); }
.label__error::after  { color: var(--bar-sky); }

.channel {
  position: absolute;
  top: clamp(1rem, 3vh, 2rem);
  left: clamp(1rem, 3vw, 2rem);
  z-index: 6;
  font-family: var(--ff-mono);
  font-size: .72rem;
  letter-spacing: 0.32em;
  color: var(--broadcast-white);
  background: rgba(20,19,26,.7);
  border: 1px solid rgba(236,233,240,.2);
  padding: .55em .9em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: .6em;
}
.channel__dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--bar-tomato);
  animation: blink 1.4s steps(2) infinite;
}
.timestamp {
  position: absolute;
  top: clamp(1rem, 3vh, 2rem);
  right: clamp(1rem, 3vw, 2rem);
  z-index: 6;
  font-family: var(--ff-mono);
  font-size: .72rem;
  letter-spacing: 0.32em;
  color: var(--broadcast-white);
  background: rgba(20,19,26,.7);
  border: 1px solid rgba(236,233,240,.2);
  padding: .55em .9em;
  text-transform: uppercase;
}

.actions {
  position: absolute;
  z-index: 6;
  bottom: clamp(1.5rem, 5vh, 3.5rem);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 1rem;
  align-items: center;
  font-family: var(--ff-mono);
  font-size: .78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.btn {
  background: var(--crt-black);
  color: var(--broadcast-white);
  border: 1px solid rgba(236,233,240,.35);
  padding: .85em 1.4em;
  cursor: pointer;
  letter-spacing: inherit;
  font-size: inherit;
  text-transform: inherit;
  transition: background .2s var(--expo), border-color .2s var(--expo), transform .15s var(--expo);
}
.btn:hover {
  background: var(--bar-tomato);
  color: var(--crt-black);
  border-color: var(--bar-tomato);
}
.btn:active { transform: scale(0.98); }
.btn:focus-visible { outline: 2px solid var(--bar-sky); outline-offset: 3px; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.25; }
}

/* ─── Accessibility ─── */
@media (prefers-reduced-motion: reduce) {
  .signal-tv__img,
  .signal-tv__grain,
  .signal-tv::after,
  .channel__dot { animation: none !important; }
  .signal-tv::before { opacity: .25; }
}

@media (max-width: 480px) {
  .channel, .timestamp { font-size: .62rem; padding: .45em .7em; }
  .label__signal { letter-spacing: 0.32em; }
}
</style>
</head>
<body>
  <main class="stage" role="main">
    <div class="signal-tv" id="screen" aria-label="No signal test pattern">
      <div class="signal-tv__img" aria-hidden="true">
        <div class="row-main">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="row-inverse">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="row-pluge">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="channel" aria-hidden="true">
        <span class="channel__dot"></span>
        <span>CH 04 · OFF AIR</span>
      </div>
      <div class="timestamp" id="timestamp" aria-hidden="true">--:--:--</div>

      <div class="label" role="status" aria-live="polite">
        <span class="label__error" data-text="404">404</span>
        <span class="label__signal">NO SIGNAL</span>
        <span class="label__sub">We'll be right back</span>
      </div>

      <div class="signal-tv__grain" aria-hidden="true"></div>
    </div>

    <div class="actions">
      <a class="btn" href="/">← Return to broadcast</a>
      <button class="btn" type="button" id="adjust" aria-label="Adjust tracking">Adjust tracking</button>
    </div>
  </main>

<script>
  // ─── Live clock ─────────────────────────────────────────────────────────
  (function () {
    var ts = document.getElementById('timestamp');
    function tick() {
      var d = new Date();
      var pad = function (n) { return String(n).padStart(2, '0'); };
      ts.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    tick(); setInterval(tick, 1000);
  })();

  // ─── .signal-tv runtime (adapted from index.html component) ────────────
  // Same scheduler cadence and variant pool as the component. Two omissions:
  //   - no `glitch-slices` (operates on image pixel rows; no <img> here)
  //   - no chroma-channel SVG filters (split is applied to label text via
  //     pseudo-elements; see CSS header comment for why)
  (function () {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    var host = document.querySelector('.signal-tv');
    if (!host) return;

    var variants = [
      { cls: 'glitch-tear',   dur: 240, weight: 4 },
      { cls: 'glitch-jitter', dur: 160, weight: 3 },
      { cls: 'glitch-split',  dur: 360, weight: 2 }
    ];
    var pool = variants.flatMap(function (v) { return Array(v.weight).fill(v); });

    function fire() {
      if (host.className.indexOf('glitch-') !== -1) return; // already animating
      var g = pool[Math.floor(Math.random() * pool.length)];
      host.classList.add(g.cls);
      setTimeout(function () { host.classList.remove(g.cls); }, g.dur);
    }

    (function tick() {
      // 5–12s between fires; 15% chance of a quick double-burst.
      setTimeout(function () {
        fire();
        if (Math.random() < 0.15) setTimeout(fire, 180 + Math.random() * 240);
        tick();
      }, 5000 + Math.random() * 7000);
    })();

    // Manual "Adjust tracking" trigger
    var btn = document.getElementById('adjust');
    if (btn) btn.addEventListener('click', function () {
      fire();
      setTimeout(fire, 140);
    });
  })();
</script>
</body>
</html>
